<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>erensearch.com - Çok Dilli Canlı Arama</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c14;color:#dce4f0;font-family:system-ui,sans-serif;min-height:100vh}
.c{max-width:800px;margin:0 auto;padding:20px}
.header{text-align:center;margin-bottom:30px}
.logo{font-size:32px;font-weight:800;background:linear-gradient(135deg,#4d94ff,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:20px;margin-bottom:20px}
.sr{display:flex;gap:10px;margin-bottom:15px}
input{flex:1;padding:15px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:#fff;font-size:16px;outline:none;transition:0.3s}
input:focus{border-color:#4d94ff;background:rgba(0,0,0,0.5)}
.btn{padding:0 25px;border-radius:12px;border:none;background:#3b7ddd;color:#fff;font-weight:700;cursor:pointer;transition:0.2s}
.btn:hover{background:#2563eb}
.lb{display:flex;gap:8px;flex-wrap:wrap}
.tag{padding:5px 12px;border-radius:20px;background:rgba(77,148,255,0.1);border:1px solid rgba(77,148,255,0.2);color:#8bb8f0;font-size:13px}

/* Dil Kartları */
.res-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;transition:0.3s;animation:slideUp 0.4s ease forwards}
.res-card:hover{background:rgba(255,255,255,0.06);transform:translateX(5px)}
.lang-info{display:flex;align-items:center;gap:15px}
.flag{font-size:30px}
.lang-name{font-size:12px;color:#6b7fa3;text-transform:uppercase;font-weight:700}
.translated-word{font-size:20px;font-weight:600;color:#34d399;margin-top:2px}
.go-btn{padding:10px 20px;border-radius:10px;background:#4d94ff;color:#fff;text-decoration:none;font-weight:bold;font-size:14px;transition:0.2s}
.go-btn:hover{background:#3b7ddd;box-shadow:0 0 15px rgba(77,148,255,0.4)}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.loading{text-align:center;padding:40px;color:#6b7fa3;font-style:italic}
</style>
</head>
<body>
<div class="c">
    <div class="header">
        <div style="font-size:40px; margin-bottom:10px">🌎</div>
        <div class="logo">erensearch.com</div>
        <p style="color:#6b7fa3; font-size:14px; margin-top:5px">Yazın, anında çevirelim ve dünyada arayalım</p>
    </div>

    <div class="card">
        <div class="sr">
            <input id="q" placeholder="Hangi kelimeyi arıyoruz?..." onkeydown="if(event.key==='Enter')go()">
            <button class="btn" onclick="go()">ARA</button>
        </div>
        <div class="lb" id="lb"></div>
    </div>
    
    <div id="results"></div>
</div>

<script>
// Dil listesi ve Google arama kodları
var L=[
    {c:"en",n:"İngilizce",f:"🇬🇧"},
    {c:"de",n:"Almanca",f:"🇩🇪"},
    {c:"fr",n:"Fransızca",f:"🇫🇷"},
    {c:"es",n:"İspanyolca",f:"🇪🇸"},
    {c:"ru",n:"Rusça",f:"🇷🇺"},
    {c:"ja",n:"Japonca",f:"🇯🇵"},
    {c:"it",n:"İtalyanca",f:"🇮🇹"},
    {c:"ar",n:"Arapça",f:"🇸🇦"}
];
var sel=["en","de", "fr", "es", "ja"]; // Varsayılan diller

function init(){
    document.getElementById("lb").innerHTML = sel.map(c => {
        let l = L.find(x=>x.c===c);
        return `<span class="tag">${l.f} ${l.n}</span>`;
    }).join("");
}

// Google Çeviri Motoru (Ücretsiz ve Hızlı)
async function translateText(text, targetLang) {
    try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`);
        const data = await res.json();
        return data[0][0][0];
    } catch (e) { return text; }
}

async function go() {
    var q = document.getElementById("q").value.trim();
    if(!q) return;
    
    var container = document.getElementById("results");
    container.innerHTML = "<div class='loading'>🤖 Kelime dillere çevriliyor...</div>";

    let html = "";
    // Her dil için döngü başlatıyoruz
    for(let code of sel) {
        let lang = L.find(x => x.c === code);
        // İşte burası çevirinin yapıldığı yer:
        let translated = await translateText(q, code);
        
        let searchUrl = `https://www.google.com/search?q=${encodeURIComponent(translated)}&hl=${code}`;

        html += `
        <div class="res-card">
            <div class="lang-info">
                <span class="flag">${lang.f}</span>
                <div>
                    <div class="lang-name">${lang.n}</div>
                    <div class="translated-word">${translated}</div>
                </div>
            </div>
            <a href="${searchUrl}" target="_blank" class="go-btn">Google'da Ara →</a>
        </div>`;
    }
    container.innerHTML = html;
}

init();
</script>
</body>
</html>
