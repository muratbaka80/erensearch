<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>erensearch.com | Global Araştırma</title>
<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#06090f;color:#dce4f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
    .c{max-width:900px;margin:0 auto;padding:30px 20px}
    .header{text-align:center;margin-bottom:25px}
    .logo{font-size:36px;font-weight:900;background:linear-gradient(135deg,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1.5px}
    .motto{color:#dce4f0; font-size:16px; margin-top:10px; font-weight: 500}
    
    .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:25px;margin-bottom:20px}
    .sr-container{display:flex; flex-direction:column; gap:12px; margin-bottom:15px}
    input{width:100%; padding:16px; border-radius:14px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.2); color:#fff; font-size:17px; outline:none; transition:0.3s}
    input:focus{border-color:#60a5fa; background:rgba(0,0,0,0.4)}
    
    /* Evrende Ara Butonu Rengi (#3b82f6) */
    .btn{width:100%; padding:16px; border-radius:14px; border:none; background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; font-weight:bold; font-size:16px; cursor:pointer; transition:0.2s; letter-spacing:1px}
    .btn:hover{transform:translateY(-2px); box-shadow:0 5px 15px rgba(59,130,246,0.3)}

    .lang-selector{display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:8px; margin-bottom:15px; display:none}
    .lang-opt{padding:10px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#94a3b8; cursor:pointer; font-size:12px; display:flex; justify-content:space-between; align-items:center; transition:0.2s}
    .lang-opt.active{background:rgba(59,130,246,0.15); border-color:#3b82f6; color:#fff}
    .lang-opt.fixed{opacity:0.7; cursor:not-allowed; background:rgba(255,255,255,0.02)}
    .check-mark{display:none; color:#34d399; font-weight:bold}
    .lang-opt.active .check-mark{display:inline}
    
    .toggle-langs{font-size:13px; color:#60a5fa; cursor:pointer; background:none; border:none; margin-bottom:10px; display:flex; align-items:center; gap:5px; text-decoration:underline}

    /* Yeni Bilgilendirme Yazısı Stili (Buton rengiyle uyumlu) */
    .hint{color:#60a5fa; font-size:13px; margin-top:10px; font-weight: 500; text-align: center; line-height: 1.5}

    .res-card{background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:15px; padding:15px 20px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; animation:fadeIn 0.3s ease}
    .lang-meta{display:flex; align-items:center; gap:15px}
    .translated-val{font-size:18px; font-weight:600; color:#34d399}
    .go-link{padding:10px 18px; border-radius:10px; background:#3b82f6; color:#fff; text-decoration:none; font-size:13px; font-weight:bold; transition:0.2s}
    
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<div class="c">
    <div class="header">
        <div class="logo">erensearch.com</div>
        <p class="motto">Öğrenmek istediğiniz bilgiyi bütün evrende arayın.</p>
    </div>

    <div class="card">
        <div class="sr-container">
            <input id="q" placeholder="Araştırılacak kelime veya terimi yazın..." onkeydown="if(event.key==='Enter')go()">
            <button class="btn" onclick="go()">EVRENDE ARA</button>
        </div>
        
        <button id="toggleBtn" class="toggle-langs" onclick="toggleSelector()">⚙️ Dil Tercihlerini Düzenle</button>
        <div id="selector" class="lang-selector"></div>
        
        <p class="hint">Küresel sonuçları yerel dilinizde okumak için tarayıcınızın otomatik çeviri özelliğini kullanmayı unutmayın.</p>
    </div>
    
    <div id="results"></div>
</div>

<script>
const allLangs = [
    {c:"tr", n:"Türkçe", f:"🇹🇷", fixed:true},
    {c:"en", n:"İngilizce", f:"🇬🇧", fixed:true},
    {c:"de", n:"Almanca", f:"🇩🇪", fixed:true},
    {c:"fr", n:"Fransızca", f:"🇫🇷", fixed:true},
    {c:"ja", n:"Japonca", f:"🇯🇵"},
    {c:"zh", n:"Çince", f:"🇨🇳"},
    {c:"ru", n:"Rusça", f:"🇷🇺"},
    {c:"es", n:"İspanyolca", f:"🇪🇸"},
    {c:"it", n:"İtalyanca", f:"🇮🇹"},
    {c:"ko", n:"Korece", f:"🇰🇷"},
    {c:"ar", n:"Arapça", f:"🇸🇦"},
    {c:"pt", n:"Portekizce", f:"🇧🇷"},
    {c:"nl", n:"Hollandaca", f:"🇳🇱"},
    {c:"sv", n:"İsveççe", f:"🇸🇪"},
    {c:"hi", n:"Hintçe", f:"🇮🇳"},
    {c:"pl", n:"Lehçe", f:"🇵🇱"}
];

let selected = ["tr", "en", "de", "fr", "ja", "ru"];

function renderSelector() {
    const div = document.getElementById("selector");
    div.innerHTML = allLangs.map(l => `
        <div class="lang-opt ${l.fixed ? 'fixed active' : (selected.includes(l.c) ? 'active' : '')}" 
             onclick="${l.fixed ? '' : `toggleLang('${l.c}')`}">
            <span>${l.f} ${l.n}</span>
            <span class="check-mark">✓</span>
        </div>
    `).join("");
}

function toggleLang(code) {
    if (selected.includes(code)) {
        selected = selected.filter(c => c !== code);
    } else {
        selected.push(code);
    }
    renderSelector();
}

function toggleSelector() {
    const s = document.getElementById("selector");
    const btn = document.getElementById("toggleBtn");
    if (s.style.display === "grid") {
        s.style.display = "none";
        btn.innerText = "⚙️ Dil Tercihlerini Düzenle";
    } else {
        s.style.display = "grid";
        btn.innerText = "✕ Seçimi Kapat";
    }
}

async function translateText(text, targetLang) {
    if(targetLang === "tr") return text;
    try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`);
        const data = await res.json();
        return data[0][0][0];
    } catch (e) { return text; }
}

async function go() {
    const q = document.getElementById("q").value.trim();
    if(!q) return;
    
    document.getElementById("selector").style.display = "none";
    document.getElementById("toggleBtn").innerText = "⚙️ Dil Tercihlerini Düzenle";

    const container = document.getElementById("results");
    container.innerHTML = "<div style='text-align:center;color:#64748b;padding:20px'>🚀 Evren taranıyor...</div>";

    let html = "";
    for(let code of selected) {
        const lang = allLangs.find(x => x.c === code);
        const translated = await translateText(q, code);
        const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(translated)}&hl=tr&sl=auto&tl=tr`;

        html += `
        <div class="res-card">
            <div class="lang-meta">
                <span style="font-size:24px">${lang.f}</span>
                <div>
                    <div style="font-size:10px; color:#64748b; font-weight:bold">${lang.n}</div>
                    <div class="translated-val">${translated}</div>
                </div>
            </div>
            <a href="${searchUrl}" target="_blank" class="go-link">Sonuçları Gör →</a>
        </div>`;
    }
    container.innerHTML = html;
}
renderSelector();
</script>
</body>
</html>
