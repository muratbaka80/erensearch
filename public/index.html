<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>erensearch.com</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#06090f;color:#dce4f0;font-family:sans-serif;min-height:100vh}
        .c{max-width:800px;margin:0 auto;padding:40px 20px}
        .header{text-align:center;margin-bottom:30px}
        .logo{font-size:40px;font-weight:900;background:linear-gradient(135deg,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .motto{color:#fff; font-size:16px; margin-top:10px; font-weight:500}
        .card{background:rgba(255,255,255,0.05);border-radius:24px;padding:30px;border:1px solid rgba(255,255,255,0.1)}
        .sr-box{display:flex; flex-direction:column; gap:15px}
        input{padding:18px; border-radius:15px; border:1px solid #333; background:#000; color:#fff; font-size:18px; outline:none}
        .btn{padding:18px; border-radius:15px; border:none; background:#3b82f6; color:#fff; font-weight:bold; font-size:18px; cursor:pointer}
        .btn:disabled{background:#555}
        .toggle-btn{background:none; border:none; color:#60a5fa; cursor:pointer; margin-top:20px; text-decoration:underline; font-size:14px; display:block; width:100%}
        .lang-grid{display:none; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:10px; margin-top:15px}
        .lang-opt{padding:10px; background:rgba(255,255,255,0.08); border-radius:10px; text-align:center; cursor:pointer; font-size:13px; border:1px solid transparent}
        .lang-opt.active{border-color:#3b82f6; background:rgba(59,130,246,0.2)}
        
        /* İstediğin Mavi Bilgilendirme Yazısı */
        .hint{color:#3b82f6; font-size:13px; margin-top:20px; text-align:center; font-weight:600; line-height:1.5}
        
        .res-item{background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(255,255,255,0.1)}
        .go-btn{background:#3b82f6; color:#fff; text-decoration:none; padding:10px 20px; border-radius:10px; font-weight:bold}
    </style>
</head>
<body>
    <div class="c">
        <div class="header">
            <div class="logo">erensearch.com</div>
            <p class="motto">Öğrenmek istediğiniz bilgiyi bütün evrende arayın.</p>
        </div>
        <div class="card">
            <div class="sr-box">
                <input type="text" id="q" placeholder="Araştırılacak kelimeyi yazın...">
                <button class="btn" id="sBtn" onclick="ara()">EVRENDE ARA</button>
            </div>
            <button class="toggle-btn" onclick="pAc()">⚙️ Dil Tercihlerini Düzenle</button>
            <div id="lG" class="lang-grid"></div>
            
            <p class="hint">Küresel sonuçları yerel dilinizde okumak için tarayıcınızın otomatik çeviri özelliğini kullanmayı unutmayın.</p>
        </div>
        <div id="res" style="margin-top:30px"></div>
    </div>

<script>
    const diller = [
        {c:"tr", n:"Türkçe", f:"🇹🇷"}, {c:"en", n:"İngilizce", f:"🇬🇧"},
        {c:"de", n:"Almanca", f:"🇩🇪"}, {c:"fr", n:"Fransızca", f:"🇫🇷"},
        {c:"ja", n:"Japonca", f:"🇯🇵"}, {c:"ru", n:"Rusça", f:"🇷🇺"}
    ];
    let secili = ["tr", "en", "de", "fr", "ja", "ru"];

    function ciz() {
        const g = document.getElementById("lG");
        g.innerHTML = diller.map(l => `
            <div class="lang-opt ${secili.includes(l.c) ? 'active' : ''}" onclick="sec('${l.c}')">
                ${l.f} ${l.n} ${secili.includes(l.c) ? '✓' : ''}
            </div>
        `).join("");
    }

    window.sec = (k) => {
        if(k === "tr") return;
        secili = secili.includes(k) ? secili.filter(x => x !== k) : [...secili, k];
        ciz();
    };

    window.pAc = () => {
        const g = document.getElementById("lG");
        g.style.display = (g.style.display === "grid") ? "none" : "grid";
    };

    window.ara = async () => {
        const k = document.getElementById("q").value.trim();
        const b = document.getElementById("sBtn");
        const r = document.getElementById("res");
        if(!k) return;

        b.disabled = true; b.innerText = "ARANIYOR...";
        r.innerHTML = "<p style='text-align:center;color:#3b82f6'>🚀 Evren taranıyor...</p>";

        let html = "";
        for(let d of secili) {
            let cev = k;
            if(d !== "tr") {
                try {
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(k)}&langpair=tr|${d}`);
                    const data = await res.json();
                    cev = data.responseData.translatedText || k;
                } catch(e) { cev = k; }
            }
            const gU = `https://www.google.com/search?q=${encodeURIComponent(cev)}&hl=tr`;
            const dO = diller.find(x => x.c === d);
            html += `<div class="res-item"><div><small style="color:#3b82f6;font-weight:bold">${dO.f} ${dO.n}</small><div style="font-size:18px;font-weight:bold;color:#34d399;margin-top:5px">${cev}</div></div><a href="${gU}" target="_blank" class="go-btn">Gör →</a></div>`;
        }
        r.innerHTML = html;
        b.disabled = false; b.innerText = "EVRENDE ARA";
    }
    ciz();
</script>
</body>
</html>
