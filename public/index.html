<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>erensearch.com - Akıllı Çok Dilli Arama</title>
<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#080c14;color:#dce4f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;line-height:1.5}
    .c{max-width:800px;margin:0 auto;padding:40px 20px}
    .header{text-align:center;margin-bottom:36px}
    .logo{font-size:36px;font-weight:900;background:linear-gradient(135deg,#4d94ff,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1.5px}
    .sub{color:#6b7fa3;font-size:14px;margin-top:8px}
    
    /* Arama Kartı */
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:24px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
    .sr{display:flex;gap:12px;margin-bottom:16px}
    input{flex:1;padding:16px 20px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:#fff;font-size:16px;outline:none;transition:all 0.3s}
    input:focus{border-color:#4d94ff;background:rgba(0,0,0,0.5);box-shadow:0 0 0 4px rgba(77,148,255,0.15)}
    .btn{padding:0 28px;border-radius:14px;border:none;background:linear-gradient(135deg,#3b7ddd,#4d94ff);color:#fff;font-weight:700;font-size:15px;cursor:pointer;transition:transform 0.2s}
    .btn:hover{transform:scale(1.02)}
    .btn:active{transform:scale(0.98)}

    /* Dil Etiketleri */
    .lb{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .tag{padding:6px 14px;border-radius:20px;background:rgba(77,148,255,0.1);border:1px solid rgba(77,148,255,0.2);color:#8bb8f0;font-size:13px;font-weight:500}
    .settings-btn{background:none;border:none;color:#6b7fa3;cursor:pointer;font-size:13px;text-decoration:underline;margin-left:auto}

    /* Dil Kartları */
    .results-area{margin-top:10px}
    .res-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:18px;padding:18px 24px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;transition:all 0.3s;animation:slideIn 0.4s ease forwards}
    .res-card:hover{background:rgba(255,255,255,0.06);border-color:rgba(77,148,255,0.3);transform:translateX(6px)}
    .lang-info{display:flex;align-items:center;gap:18px}
    .flag{font-size:32px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
    .lang-name{font-size:11px;color:#6b7fa3;text-transform:uppercase;font-weight:800;letter-spacing:1px}
    .translated-word{font-size:20px;font-weight:600;color:#34d399;margin-top:2px}
    .go-btn{padding:12px 20px;border-radius:12px;background:rgba(77,148,255,0.12);color:#4d94ff;text-decoration:none;font-weight:700;font-size:13px;border:1px solid rgba(77,148,255,0.2);transition:0.2s}
    .go-btn:hover{background:#4d94ff;color:#fff}

    @keyframes slideIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
    .loading{text-align:center;padding:40px;color:#6b7fa3;font-style:italic}
    .ft{text-align:center;margin-top:40px;color:#4a5f7f;font-size:12px}
    
    @media(max-width:600px){
        .sr{flex-direction:column}
        .btn{padding:16px}
        .res-card{flex-direction:column; align-items:flex-start; gap:15px}
        .go-btn{width:100%; text-align:center}
    }
</style>
</head>
<body>

<div class="c">
    <div class="header">
        <div style="font-size:45px; margin-bottom:10px">🌐</div>
        <div class="logo">erensearch.com</div>
        <p class="sub">Yazın, anında tüm dillere çevirip dünyada arayalım</p>
    </div>

    <div class="card">
        <div class="sr">
            <input id="q" placeholder="Bir kelime veya cümle yazın..." onkeydown="if(event.key==='Enter')go()">
            <button class="btn" onclick="go()">ARA</button>
        </div>
        <div class="lb" id="lb"></div>
    </div>
    
    <div id="results" class="results-area"></div>
    
    <div class="ft">erensearch.com &copy; 2026 | Global Arama Gücü</div>
</div>

<script>
// Aktif Dil Listesi
const L=[
    {c:"en",n:"İngilizce",f:"🇬🇧"},
    {c:"de",n:"Almanca",f:"🇩🇪"},
    {c:"fr",n:"Fransızca",f:"🇫🇷"},
    {c:"es",n:"İspanyolca",f:"🇪🇸"},
    {c:"it",n:"İtalyanca",f:"🇮🇹"},
    {c:"ru",n:"Rusça",f:"🇷🇺"},
    {c:"ja",n:"Japonca",f:"🇯🇵"},
    {c:"ar",n:"Arapça",f:"🇸🇦"}
];
// Başlangıçta seçili diller
let sel=["en","de", "fr", "es", "ja", "it"];

function init(){
    document.getElementById("lb").innerHTML = sel.map(c => {
        let l = L.find(x=>x.c===c);
        return `<span class="tag">${l.f} ${l.n}</span>`;
    }).join("");
}

// Google Çeviri API (Otomatik Algılama Destekli)
async function translateText(text, targetLang) {
    try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`);
        const data = await res.json();
        return data[0][0][0];
    } catch (e) { return text; }
}

async function go() {
    const q = document.getElementById("q").value.trim();
    if(!q) return;
    
    const container = document.getElementById("results");
    container.innerHTML = "<div class='loading'>🌍 Diller analiz ediliyor ve çevriliyor...</div>";

    let html = "";
    
    // Her dil için çeviri ve link oluşturma
    for(let code of sel) {
        const langInfo = L.find(x => x.c === code);
        const translated = await translateText(q, code);
        
        // AKILLI LİNK YAPISI:
        // hl=tr -> Google menülerini Türkçe yapar
        // sl=auto -> Aranan kelimenin dilini otomatik algılar
        // tl=tr -> Sayfada "Türkçeye çevir" barını tetikler
        const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(translated)}&hl=tr&sl=auto&tl=tr`;

        html += `
        <div class="res-card">
            <div class="lang-info">
                <span class="flag">${langInfo.f}</span>
                <div>
                    <div class="lang-name">${langInfo.n}</div>
                    <div class="translated-word">${translated}</div>
                </div>
            </div>
            <a href="${searchUrl}" target="_blank" class="go-btn">Google'da Ara →</a>
        </div>`;
    }
    
    container.innerHTML = html;
}

// Uygulamayı başlat
init();
</script>

</body>
</html>
