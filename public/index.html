<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>erensearch.com | Global Bilim & Araştırma</title>
<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#06090f;color:#dce4f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
    .c{max-width:900px;margin:0 auto;padding:30px 20px}
    .header{text-align:center;margin-bottom:30px}
    .logo{font-size:32px;font-weight:900;background:linear-gradient(135deg,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
    
    /* Arama Alanı */
    .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:20px;margin-bottom:20px}
    .sr{display:flex;gap:10px;margin-bottom:15px}
    input{flex:1;padding:15px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.2);color:#fff;font-size:16px;outline:none}
    input:focus{border-color:#60a5fa}
    .btn{padding:0 30px;border-radius:12px;border:none;background:#3b82f6;color:#fff;font-weight:bold;cursor:pointer}

    /* Dil Seçimi Bölümü */
    .lang-selector{display:grid;grid-template-columns:repeat(auto-fill, minmax(130px, 1fr));gap:8px;margin-bottom:15px;display:none}
    .lang-opt{padding:8px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#94a3b8;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px}
    .lang-opt.active{background:rgba(59,130,246,0.2);border-color:#3b82f6;color:#fff}
    .lang-opt.fixed{opacity:0.6;cursor:not-allowed;border-style:dashed}
    
    .toggle-langs{font-size:13px;color:#60a5fa;cursor:pointer;background:none;border:none;margin-bottom:10px;display:flex;align-items:center;gap:5px}

    /* Sonuç Kartları */
    .res-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:15px;padding:15px 20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;animation:fadeIn 0.3s ease}
    .lang-meta{display:flex;align-items:center;gap:15px}
    .translated-val{font-size:18px;font-weight:600;color:#34d399}
    .go-link{padding:8px 16px;border-radius:8px;background:rgba(96,165,250,0.1);color:#60a5fa;text-decoration:none;font-size:13px;font-weight:bold;border:1px solid rgba(96,165,250,0.2)}
    
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<div class="c">
    <div class="header">
        <div class="logo">erensearch.com</div>
        <p style="color:#64748b; font-size:13px">Bilimsel ve Global Araştırma Motoru</p>
    </div>

    <div class="card">
        <div class="sr">
            <input id="q" placeholder="Araştırılacak terimi yazın..." onkeydown="if(event.key==='Enter')go()">
            <button class="btn" onclick="go()">ARA</button>
        </div>
        
        <button class="toggle-langs" onclick="toggleSelector()">⚙️ Dil Seçeneklerini Özelleştir (16 Dil)</button>
        <div id="selector" class="lang-selector"></div>
    </div>
    
    <div id="results"></div>
</div>

<script>
// Sabit diller: tr, en, de, fr
// Diğerleri opsiyonel
const allLangs = [
    {c:"tr", n:"Türkçe", f:"🇹🇷", fixed:true},
    {c:"en", n:"İngilizce", f:"🇬🇧", fixed:true},
    {c:"de", n:"Almanca", f:"🇩🇪", fixed:true},
    {c:"fr", n:"Fransızca", f:"🇫🇷", fixed:true},
    {c:"ja", n:"Japonca", f:"🇯🇵"},
    {c:"zh", n:"Çince", f:"🇨🇳"},
    {c:"ru", n:"Rusça", f:"🇷🇺"},
    {c:"es", n:"İspanyolca", f:"🇪🇸"},
    {c:"it", n:"İtalyanca", f:"🇮🇹"},
    {c:"ko", n:"Korece", f:"🇰🇷"},
    {c:"ar", n:"Arapça", f:"🇸🇦"},
    {c:"pt", n:"Portekizce", f:"🇧🇷"},
    {c:"nl", n:"Hollandaca", f:"🇳🇱"},
    {c:"sv", n:"İsveççe", f:"🇸🇪"},
    {c:"hi", n:"Hintçe", f:"🇮🇳"},
    {c:"pl", n:"Lehçe", f:"🇵🇱"}
];

let selected = ["tr", "en", "de", "fr", "ja", "ru"]; // Başlangıç dilleri

function renderSelector() {
    const div = document.getElementById("selector");
    div.innerHTML = allLangs.map(l => `
        <div class="lang-opt ${l.fixed ? 'fixed active' : (selected.includes(l.c) ? 'active' : '')}" 
             onclick="${l.fixed ? '' : `toggleLang('${l.c}')`}">
            <span>${l.f}</span> ${l.n}
        </div>
    `).join("");
}

function toggleLang(code) {
    if (selected.includes(code)) {
        selected = selected.filter(c => c !== code);
    } else {
        selected.push(code);
    }
    renderSelector();
}

function toggleSelector() {
    const s = document.getElementById("selector");
    s.style.display = s.style.display === "grid" ? "none" : "grid";
}

async function translateText(text, targetLang) {
    if(targetLang === "tr") return text;
    try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`);
        const data = await res.json();
        return data[0][0][0];
    } catch (e) { return text; }
}

async function go() {
    const q = document.getElementById("q").value.trim();
    if(!q) return;
    
    const container = document.getElementById("results");
    container.innerHTML = "<div style='text-align:center;color:#64748b'>Bilimsel kaynaklar taranıyor...</div>";

    let html = "";
    for(let code of selected) {
        const lang = allLangs.find(x => x.c === code);
        const translated = await translateText(q, code);
        const url = `https://www.google.com/search?q=${encodeURIComponent(translated)}&hl=tr&sl=auto&tl=tr`;

        html += `
        <div class="res-card">
            <div class="lang-meta">
                <span style="font-size:24px">${lang.f}</span>
                <div>
                    <div style="font-size:10px; color:#64748b; font-weight:bold">${lang.n}</div>
                    <div class="translated-val">${translated}</div>
                </div>
            </div>
            <a href="${url}" target="_blank" class="go-link">Arama Yap</a>
        </div>`;
    }
    container.innerHTML = html;
}

renderSelector();
init();
</script>
</body>
</html>
