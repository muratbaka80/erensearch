<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>erensearch.com - Otomatik Çevirili Arama</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c14;color:#dce4f0;font-family:system-ui,sans-serif;min-height:100vh}
.c{max-width:900px;margin:0 auto;padding:40px 20px}
.header{text-align:center;margin-bottom:36px}
.logo{font-size:28px;font-weight:800;background:linear-gradient(135deg,#4d94ff,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#6b7fa3;font-size:14px;margin-top:6px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:20px;margin-bottom:14px}
.sr{display:flex;gap:10px;margin-bottom:14px}
input{flex:1;padding:14px 18px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:#dce4f0;font-size:16px;outline:none}
.btn{padding:14px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,#3b7ddd,#4d94ff);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.lb{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lt{padding:6px 14px;border-radius:20px;border:1px dashed rgba(255,255,255,0.18);background:transparent;color:#6b7fa3;font-size:13px;cursor:pointer}
.tag{padding:4px 10px;border-radius:14px;background:rgba(77,148,255,0.12);border:1px solid rgba(77,148,255,0.18);font-size:12px;color:#8bb8f0}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:14px}
.lo{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.07);background:transparent;color:#6b7fa3;font-size:13px;cursor:pointer;width:100%;text-align:left}
.lo.a{border-color:rgba(77,148,255,0.4);background:rgba(77,148,255,0.12);color:#93c5fd;font-weight:600}
.rc{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);text-decoration:none;color:#dce4f0;margin-bottom:10px}
.ri{flex:1}
.rn{font-size:11px;color:#6b7fa3;font-weight:700;text-transform:uppercase}
.rv{font-size:16px;font-weight:500;color:#34d399;margin-top:2px}
.rb{padding:6px 14px;border-radius:8px;background:rgba(77,148,255,0.12);color:#4d94ff;font-size:12px;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="c">
    <div class="header"><div style="font-size:32px">🌍</div><div class="logo">erensearch.com</div><p class="sub">Yazın, anında tüm dillere çevirip arayalım</p></div>
    <div class="card">
        <div class="sr"><input id="q" placeholder="Bir kelime yazın (Örn: Yapay Zeka)..." onkeydown="if(event.key==='Enter')go()"><button class="btn" onclick="go()">🔍 Çevir ve Ara</button></div>
        <div class="lb" id="lb"></div>
    </div>
    <div class="card" id="pp" style="display:none"><div class="pg" id="pg"></div></div>
    <div id="ra" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="font-size:16px;color:#8bb8f0">Çeviri Sonuçları</h2>
            <button onclick="oall()" style="padding:8px 15px; border-radius:8px; background:#059669; color:white; border:none; cursor:pointer; font-weight:bold">🚀 Tümünü Google'da Aç</button>
        </div>
        <div id="rl"></div>
    </div>
</div>

<script>
var L=[{c:"en",n:"İngilizce",f:"🇬🇧"},{c:"de",n:"Almanca",f:"🇩🇪"},{c:"fr",n:"Fransızca",f:"🇫🇷"},{c:"es",n:"İspanyolca",f:"🇪🇸"},{c:"it",n:"İtalyanca",f:"🇮🇹"},{c:"ru",n:"Rusça",f:"🇷🇺"},{c:"ja",n:"Japonca",f:"🇯🇵"},{c:"ar",n:"Arapça",f:"🇸🇦"}];
var sel=["en","de","fr"], po=false;

function init(){rg();ub()}
function rg(){document.getElementById("pg").innerHTML=L.map(function(l){return'<button class="lo'+(sel.indexOf(l.c)>-1?' a':'')+'" onclick="tl(\''+l.c+'\')"><span>'+l.f+'</span><span>'+l.n+'</span></button>'}).join("")}
function tl(c){var i=sel.indexOf(c);if(i>-1)sel.splice(i,1);else sel.push(c);rg();ub()}
function ub(){var b=document.getElementById("lb");var h='<button class="lt" onclick="tp()">⚙️ Dil Ayarı ('+sel.length+')</button>';sel.forEach(function(c){var l=L.find(function(x){return x.c===c});h+='<span class="tag">'+l.f+' '+l.n+'</span>'});b.innerHTML=h;}
function tp(){po=!po;document.getElementById("pp").style.display=po?"block":"none"}

async function translateText(text, targetLang) {
    try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`);
        const data = await res.json();
        return data[0][0][0];
    } catch (e) { return text; }
}

async function go() {
    var q = document.getElementById("q").value.trim();
    if(!q) return;
    
    var list = document.getElementById("rl");
    document.getElementById("ra").style.display = "block";
    list.innerHTML = "<p style='text-align:center; padding:20px; color:#6b7fa3;'>🤖 Çeviriler yapılıyor, lütfen bekleyin...</p>";

    let results = [];
    for(let code of sel) {
        let lang = L.find(x => x.c === code);
        let translated = await translateText(q, code);
        results.push({lang: lang, translated: translated});
    }

    let html = "";
    results.forEach(r => {
        let searchUrl = `https://www.google.com/search?q=${encodeURIComponent(r.translated)}&hl=${r.lang.c}`;
        html += `
        <div class="rc">
            <span style="font-size:24px; padding:15px;">${r.lang.f}</span>
            <div class="ri">
                <div class="rn">${r.lang.n}</div>
                <div class="rv">${r.translated}</div>
            </div>
            <a href="${searchUrl}" target="_blank" class="rb" style="margin-right:15px;">Google'da Ara →</a>
        </div>`;
    });
    list.innerHTML = html;
    window.lastResults = results;
}

function oall(){
    if(!window.lastResults) return;
    window.lastResults.forEach((r, i) => {
        setTimeout(() => {
            window.open(`https://www.google.com/search?q=${encodeURIComponent(r.translated)}&hl=${r.lang.c}`, "_blank");
        }, i * 400);
    });
}
init();
</script>
</body>
</html>
